<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DDOM Simulation</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: #f0f0e8; color: #1a1a1a; min-height: 100vh; }

        /* TOP HEADER */
        .top-header {
            background: #fff;
            border-bottom: 1px solid #ddd;
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 54px;
        }
        .top-header .logo { display: flex; align-items: center; gap: 10px; }
        .top-header .logo img { height: 28px; }
        .top-header .logo-text { font-size: 1.05rem; font-weight: 700; color: #e34c26; letter-spacing: -0.3px; }
        .top-header .quarter-badge {
            background: #1a1a1a;
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* MAIN CONTENT AREA */
        .main-layout { display: flex; flex-direction: column; }

        /* SECTION TITLE BAR */
        .section-title {
            background: #fff;
            padding: 10px 32px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #333;
            border-bottom: 1px solid #ddd;
        }

        /* TWO COLUMNS */
        .two-col {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
            border-bottom: 1px solid #ddd;
        }
        .col-left {
            background: #fff;
            border-right: 1px solid #ddd;
            padding: 20px 24px;
        }
        .col-right {
            background: #fff;
            padding: 20px 24px;
        }

        /* CHART AREA */
        .chart-title { font-size: 0.8rem; color: #555; margin-bottom: 12px; font-weight: 500; }
        .chart-container { position: relative; height: 220px; }

        /* KPI PANEL */
        .kpi-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .kpi-nav button {
            background: none; border: 1px solid #ccc; color: #333;
            width: 28px; height: 28px; border-radius: 50%;
            cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center;
            transition: all 0.15s;
        }
        .kpi-nav button:hover { background: #f0f0e8; }
        .kpi-nav button:disabled { opacity: 0.3; cursor: default; }
        .kpi-quarter-label { font-size: 0.95rem; font-weight: 600; color: #222; }
        .kpi-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
        .kpi-card { }
        .kpi-label { font-size: 0.72rem; color: #666; margin-bottom: 3px; }
        .kpi-value { font-size: 0.95rem; font-weight: 600; color: #1a1a1a; }
        .kpi-value.green { color: #2a7a3b; }
        .kpi-value.red { color: #c0392b; }

        /* PHASE TABS */
        .phase-tabs-row {
            display: flex;
            background: #fff;
            border-bottom: 2px solid #ddd;
        }
        .phase-tab {
            flex: 1;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            color: #555;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.15s;
            user-select: none;
        }
        .phase-tab:hover { background: #f5f5f0; }
        .phase-tab.active {
            color: #c0392b;
            border-bottom-color: #c0392b;
            font-weight: 600;
        }
        .phase-pct { font-size: 0.72rem; color: #888; margin-top: 2px; }
        .phase-tab.active .phase-pct { color: #c0392b; }

        /* INPUT TABLE */
        .input-area {
            background: #fff;
            padding: 20px 32px;
            border-bottom: 1px solid #ddd;
        }
        .input-table { width: 100%; border-collapse: collapse; }
        .input-table th {
            text-align: left; padding: 8px 12px;
            font-size: 0.78rem; color: #666; font-weight: 500;
            border-bottom: 1px solid #ddd;
        }
        .input-table td {
            padding: 10px 12px;
            font-size: 0.85rem;
            border-bottom: 1px solid #f0f0e8;
            vertical-align: middle;
        }
        .input-table tr:last-child td { border-bottom: none; }
        .type-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .type-badge.var { background: #e8f4fd; color: #1a5276; }
        .type-badge.fix { background: #fef9e7; color: #784212; }

        .input-cell { display: flex; align-items: center; gap: 6px; }
        .input-cell span { color: #888; font-size: 0.85rem; }
        .budget-input {
            width: 80px;
            border: 1px solid #bbb;
            border-radius: 4px;
            padding: 5px 8px;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            color: #1a1a1a;
            text-align: right;
        }
        .budget-input:focus { outline: none; border-color: #c0392b; }
        .m-label { font-size: 0.85rem; color: #555; }

        /* NAV BUTTONS ROW */
        .nav-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 32px;
            background: #fff;
            border-bottom: 1px solid #ddd;
        }
        .nav-row .nav-btns { display: flex; gap: 10px; }
        .btn-nav {
            padding: 7px 22px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            border: 1px solid #bbb;
            background: #fff;
            color: #333;
            transition: all 0.15s;
        }
        .btn-nav:hover { background: #f0f0e8; }
        .btn-nav.primary {
            background: #c0392b;
            color: #fff;
            border-color: #c0392b;
        }
        .btn-nav.primary:hover { background: #a93226; }
        .btn-nav:disabled { opacity: 0.4; cursor: not-allowed; }

        .budget-remaining {
            font-size: 0.85rem;
            font-weight: 500;
            color: #333;
        }
        .budget-remaining.over { color: #c0392b; }
        .budget-remaining.exact { color: #2a7a3b; }

        /* HYPOTHESIS */
        .hypothesis-area {
            background: #fff;
            padding: 16px 32px 24px;
        }
        .hypothesis-area label {
            font-size: 0.85rem; font-weight: 600; color: #333; display: block; margin-bottom: 8px;
        }
        .hypothesis-area textarea {
            width: 100%;
            height: 80px;
            border: 1px solid #ccc;
            border-radius: 4px;
            padding: 10px 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            color: #333;
            resize: vertical;
        }
        .hypothesis-area textarea:focus { outline: none; border-color: #c0392b; }
        .char-count { font-size: 0.75rem; color: #999; margin-top: 4px; text-align: right; }

        /* COMMIT BUTTON */
        .commit-row {
            padding: 16px 32px 24px;
            background: #f0f0e8;
            display: flex;
            justify-content: flex-end;
        }
        .btn-commit {
            padding: 10px 36px;
            background: #1a6fc4;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-commit:hover { background: #1558a0; }
        .btn-commit:disabled { background: #aaa; cursor: not-allowed; }

        /* RESULTS TABLE */
        .results-area {
            background: #fff;
            padding: 20px 32px;
            margin-top: 2px;
        }
        .results-table { width: 100%; border-collapse: collapse; }
        .results-table th {
            text-align: left; padding: 8px 12px;
            font-size: 0.78rem; color: #666; font-weight: 600;
            border-bottom: 2px solid #ddd;
        }
        .results-table td {
            padding: 10px 12px;
            font-size: 0.85rem;
            border-bottom: 1px solid #f0f0e8;
        }
        .results-table tr:hover td { background: #fafaf6; }

        /* OVERLAY SCREENS */
        .overlay {
            position: fixed; top:0; left:0; width:100vw; height:100vh;
            background: rgba(0,0,0,0.7);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .overlay-card {
            background: #fff;
            border-radius: 12px;
            padding: 48px 60px;
            text-align: center;
            max-width: 520px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .overlay-card h2 { font-size: 1.8rem; margin-bottom: 12px; }
        .overlay-card p { color: #555; line-height: 1.6; margin-bottom: 28px; }
        .overlay-card .big-num { font-size: 2.8rem; font-weight: 700; margin: 16px 0; }

        /* SIDEBAR LAYOUT */
        .dashboard-layout {
            display: flex;
            min-height: calc(100vh - 54px);
        }
        .sidebar {
            width: 250px;
            background: #fdfdfc;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            flex-shrink: 0;
        }
        .sidebar-menu-item {
            padding: 12px 24px;
            font-size: 0.9rem;
            color: #555;
            cursor: pointer;
            transition: all 0.15s;
        }
        .sidebar-menu-item:hover {
            background: #f5f5f0;
            color: #1a1a1a;
        }
        .sidebar-menu-item.active {
            background: #fefce8;
            color: #c0392b;
            font-weight: 600;
            border-left: 4px solid #c0392b;
            padding-left: 20px;
        }
        .main-content {
            flex: 1;
            background: #f0f0e8;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const PHASES = [
  {
    key: 'disc', label: 'Discover',
    varDesc: 'Awareness marketing (integrated brand campaigns, display, SEM, social)',
    fixDesc: 'Landing page optimization & A/B testing',
  },
  {
    key: 'try', label: 'Try',
    varDesc: 'Consideration marketing for trial (email, social, display)',
    fixDesc: 'Recommendation engine to match users with products',
  },
  {
    key: 'buy', label: 'Buy',
    varDesc: 'Performance marketing (branded SEM, social/display retargeting)',
    fixDesc: 'E-Commerce website optimization',
  },
  {
    key: 'use', label: 'Use',
    varDesc: 'Engagement marketing (email, social, display to current users)',
    fixDesc: 'Product engagement (tutorial content, first mile)',
  },
  {
    key: 'renew', label: 'Renew',
    varDesc: 'Save offers (discounts to reduce churn)',
    fixDesc: 'Optimization of payment processing, bank relationships',
  },
];

const BASELINE_KPI = {
  quarter: "Q4'20",
  netNewArr: 400, grossArr: 918, visitors: 137.1,
  trials: 12.75, orders: 1.53, mau: 7.85,
  retention: 70.57, cancelArr: -523, roi: 3.67,
};

const DEFAULTS_2021 = { discVar:46,discFixed:6,tryVar:34,tryFixed:6,buyVar:94,buyFixed:6,useVar:36,useFixed:6,renewVar:12,renewFixed:4 };
const DEFAULTS_2022 = { discVar:56,discFixed:12,tryVar:46,tryFixed:12,buyVar:78,buyFixed:18,useVar:38,useFixed:12,renewVar:16,renewFixed:12 };

// Budget Allocation Chart Component
function BudgetChart({ history }) {
    const canvasRef = useRef(null);
    const chartRef = useRef(null);

    useEffect(() => {
        const timer = setTimeout(() => {
            if (!canvasRef.current) return;
            if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }

            const labels = ["Q3'20","Q4'20","Q1'21","Q2'21","Q3'21","Q4'21","Q1'22","Q2'22","Q3'22","Q4'22"];
            const getPhaseData = (key) => {
                const base = [null, null]; // Q3'20, Q4'20 - no data
                history.forEach((alloc) => {
                    const tot = Object.values(alloc).reduce((a,b)=>a+Number(b),0);
                    const phaseTotal = Number(alloc[`${key}Var`]||0) + Number(alloc[`${key}Fixed`]||0);
                    base.push(tot > 0 ? parseFloat((phaseTotal/tot*100).toFixed(1)) : null);
                });
                while (base.length < labels.length) base.push(null);
                return base;
            };

            const datasets = [
                { label: 'Discover', data: getPhaseData('disc'),  borderColor: '#e74c3c', backgroundColor: '#e74c3c', tension: 0.3 },
                { label: 'Try',      data: getPhaseData('try'),   borderColor: '#3498db', backgroundColor: '#3498db', tension: 0.3 },
                { label: 'Buy',      data: getPhaseData('buy'),   borderColor: '#2ecc71', backgroundColor: '#2ecc71', tension: 0.3 },
                { label: 'Use',      data: getPhaseData('use'),   borderColor: '#9b59b6', backgroundColor: '#9b59b6', tension: 0.3 },
                { label: 'Renew',    data: getPhaseData('renew'), borderColor: '#f39c12', backgroundColor: '#f39c12', tension: 0.3 },
            ].map(ds => ({ ...ds, borderWidth: 2, pointRadius: 4, pointBackgroundColor: ds.borderColor, fill: false, spanGaps: true }));

            chartRef.current = new Chart(canvasRef.current, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11 }, padding: 10 } },
                        tooltip: { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.parsed.y}%` } }
                    },
                    scales: {
                        y: {
                            min: 0, max: 55,
                            title: { display: true, text: '% of Total Budget', font: { size: 10 }, color: '#888' },
                            grid: { color: '#f0f0e8' },
                            ticks: { font: { size: 10 }, color: '#888', callback: v => v + '%' }
                        },
                        x: { grid: { color: '#f0f0e8' }, ticks: { font: { size: 10 }, color: '#888' } }
                    }
                }
            });
        }, 50);
        return () => {
            clearTimeout(timer);
            if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
        };
    }, [history.length]);

    return (
        <div>
            <div className="chart-title">Budget Allocation — Prior Quarters (by stage %)</div>
            <div className="chart-container"><canvas ref={canvasRef} /></div>
        </div>
    );
}

// Single KPI line chart (reusable)
function KpiLineChart({ title, labels, data, color, yLabel, formatTick, formatTooltip }) {
    const canvasRef = useRef(null);
    const chartRef = useRef(null);

    useEffect(() => {
        const timer = setTimeout(() => {
            if (!canvasRef.current || data.length === 0) return;
            if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }

            chartRef.current = new Chart(canvasRef.current, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: title,
                        data,
                        borderColor: color,
                        backgroundColor: color + '18',
                        borderWidth: 2,
                        pointRadius: 4,
                        pointBackgroundColor: color,
                        fill: true,
                        tension: 0.3,
                        spanGaps: true,
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: ctx => formatTooltip ? formatTooltip(ctx.parsed.y) : String(ctx.parsed.y)
                            }
                        }
                    },
                    scales: {
                        y: {
                            title: { display: true, text: yLabel, font: { size: 9 }, color: '#888' },
                            grid: { color: '#f0f0e8' },
                            ticks: { font: { size: 9 }, color: '#888', callback: formatTick || (v => v) }
                        },
                        x: { grid: { color: '#f0f0e8' }, ticks: { font: { size: 9 }, color: '#888' } }
                    }
                }
            });
        }, 60);
        return () => {
            clearTimeout(timer);
            if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
        };
    }, [data.length]);

    return (
        <div style={{background:'#fff', border:'1px solid #e8e8e0', borderRadius:4, padding:'14px 16px'}}>
            <div style={{fontSize:'0.75rem', color:'#555', fontWeight:600, marginBottom:8, textTransform:'uppercase', letterSpacing:'0.4px'}}>{title}</div>
            <div style={{height:180}}><canvas ref={canvasRef} /></div>
        </div>
    );
}

// Consolidated Report (Key Performance Indicators)
function ConsolidatedReport({ results }) {
    if (results.length === 0) return null;
    const allLabels = [BASELINE_KPI.quarter, ...results.map(r => r.quarter)];
    const allVisitors = [BASELINE_KPI.visitors, ...results.map(r => r.visitors)];
    const allTrials = [BASELINE_KPI.trials, ...results.map(r => r.trials)];
    const allOrders = [BASELINE_KPI.orders, ...results.map(r => r.orders)];
    const allGrossArr = [BASELINE_KPI.grossArr, ...results.map(r => r.grossArr)];

    return (
        <div style={{marginTop: '10px', marginBottom: '10px'}}>
            <div style={{fontSize:'1.1rem', fontWeight:600, color:'#333', marginBottom:14}}>
                Key Performance Indicators
            </div>
            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, background:'#fefce8', padding:'20px', borderRadius:'8px', border:'1px solid #e8e8e0'}}>
                {/* Discover */}
                <KpiLineChart
                    title="Discover: # OF VISITORS TO WEBSITE (M)"
                    labels={allLabels}
                    data={allVisitors}
                    color="#34495e"
                    yLabel="Millions"
                    formatTick={v => v}
                    formatTooltip={v => `# of Visitors to website (M): ${v}`}
                />
                {/* Try */}
                <KpiLineChart
                    title="Try: # OF FREE TRIALS (M)"
                    labels={allLabels}
                    data={allTrials}
                    color="#34495e"
                    yLabel="Millions"
                    formatTick={v => v}
                    formatTooltip={v => `# of Free Trials (M): ${v}`}
                />
                {/* Buy (Orders) */}
                <KpiLineChart
                    title="Buy: # OF ORDERS (M)"
                    labels={allLabels}
                    data={allOrders}
                    color="#34495e"
                    yLabel="Millions"
                    formatTick={v => v}
                    formatTooltip={v => `# of Orders (M): ${v}`}
                />
                {/* Buy (Gross ARR) */}
                <KpiLineChart
                    title="Buy: GROSS NEW ARR ($M)"
                    labels={allLabels}
                    data={allGrossArr}
                    color="#34495e"
                    yLabel="$ Millions"
                    formatTick={v => `$${v}`}
                    formatTooltip={v => `Gross New ARR ($M): ${v}`}
                />
            </div>
        </div>
    );
}

// 2×2 KPI Chart Grid (matching reference image)
function ResultsChart({ results }) {
    if (results.length === 0) return null;
    const labels = results.map(r => r.quarter);

    return (
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:16, padding:'16px 0'}}>
            {/* Net New ARR */}
            <KpiLineChart
                title="Net New ARR ($M)"
                labels={labels}
                data={results.map(r => r.netNewArr)}
                color="#1a6fc4"
                yLabel="Net New ARR ($M)"
                formatTick={v => `$${v}M`}
                formatTooltip={v => `Net New ARR: $${v}M`}
            />
            {/* Retention Rate */}
            <KpiLineChart
                title="Retention Rate (%)"
                labels={labels}
                data={results.map(r => r.retention)}
                color="#2ecc71"
                yLabel="Retention (%)"
                formatTick={v => `${v}%`}
                formatTooltip={v => `Retention: ${v}%`}
            />
            {/* Cancel ARR */}
            <KpiLineChart
                title="Cancel ARR ($M)"
                labels={labels}
                data={results.map(r => r.cancelArr)}
                color="#e74c3c"
                yLabel="Cancel ARR ($M)"
                formatTick={v => `$${v}M`}
                formatTooltip={v => `Cancel ARR: $${v}M`}
            />
            {/* Per Dollar ROI */}
            <KpiLineChart
                title="Per Dollar ROI ($)"
                labels={labels}
                data={results.map(r => r.roi !== null && r.roi !== undefined ? parseFloat(parseFloat(r.roi).toFixed(2)) : null)}
                color="#f39c12"
                yLabel="ROI ($ per $1 spent)"
                formatTick={v => `$${v.toFixed(1)}`}
                formatTooltip={v => `ROI: $${v.toFixed(2)} per $1`}
            />
        </div>
    );
}



// KPI Panel Component
function KpiPanel({ results }) {
    const [idx, setIdx] = useState(0);
    const all = [BASELINE_KPI, ...results];
    useEffect(() => { setIdx(all.length - 1); }, [results.length]);
    const kpi = all[idx] || BASELINE_KPI;
    // Always use the quarter field directly from the data (Q4'20 for baseline)
    const label = kpi.quarter;

    // Format ROI: engine returns grossArr/totalSpend (e.g. 3.67 means $3.67 per $1 spent)
    const formatRoi = (roi) => {
        if (roi === undefined || roi === null) return 'N/A';
        const n = parseFloat(roi);
        if (isNaN(n)) return 'N/A';
        return `$${n.toFixed(2)} per $1`;
    };

    return (
        <div>
            <div style={{fontSize:'0.8rem', color:'#555', marginBottom:10, fontWeight:500}}>Previous Quarters' KPI</div>
            <div className="kpi-nav">
                <button onClick={() => setIdx(i => i-1)} disabled={idx===0}>&#8249;</button>
                <span className="kpi-quarter-label">{label}</span>
                <button onClick={() => setIdx(i => i+1)} disabled={idx===all.length-1}>&#8250;</button>
            </div>
            <div className="kpi-grid">
                <div className="kpi-card">
                    <div className="kpi-label">Net-New ARR</div>
                    <div className="kpi-value">{kpi.netNewArr}M</div>
                </div>
                <div className="kpi-card">
                    <div className="kpi-label">Gross New ARR</div>
                    <div className="kpi-value green">{kpi.grossArr}M</div>
                </div>
                <div className="kpi-card">
                    <div className="kpi-label">Site Visitors</div>
                    <div className="kpi-value">{kpi.visitors}M</div>
                </div>
                <div className="kpi-card">
                    <div className="kpi-label">Free Trials</div>
                    <div className="kpi-value">{kpi.trials}M</div>
                </div>
                <div className="kpi-card">
                    <div className="kpi-label">Orders</div>
                    <div className="kpi-value">{kpi.orders}M</div>
                </div>
                <div className="kpi-card">
                    <div className="kpi-label">Monthly Active Users</div>
                    <div className="kpi-value">{kpi.mau}M</div>
                </div>
                <div className="kpi-card">
                    <div className="kpi-label">Retention Rate</div>
                    <div className="kpi-value">{kpi.retention}%</div>

                <div className="kpi-card">

                    <div className="kpi-value">{formatRoi(kpi.roi)}</div>
                </div>
            </div>
        </div>
    );
}

function App() {
    const [results, setResults] = useState([]);
    const [history, setHistory] = useState([]);
    const [alloc, setAlloc] = useState(DEFAULTS_2021);
    const [activePhase, setActivePhase] = useState(0);
    const [hypothesis, setHypothesis] = useState('');
    const [loading, setLoading] = useState(false);
    const [showFinalScreen, setShowFinalScreen] = useState(false);
    const [activeReportTab, setActiveReportTab] = useState('input');
    const [hasStarted, setHasStarted] = useState(false);

    const quarterNum = results.length;
    const year = quarterNum < 4 ? 2021 : 2022;
    const qInYear = (quarterNum % 4) + 1;
    const targetBudget = quarterNum < 4 ? 250 : 300;

    useEffect(() => { if (quarterNum === 4) setAlloc(DEFAULTS_2022); }, [quarterNum]);

    if (!hasStarted) {
        return <WelcomeScreen onStart={() => setHasStarted(true)} />;
    }

    const totalSpend = Object.values(alloc).reduce((a,b) => a + Number(b||0), 0);
    const remaining = targetBudget - totalSpend;

    // Previous quarter values (baseline or last result)
    const prevKpi = results.length > 0 ? results[results.length-1] : BASELINE_KPI;
    const prevAlloc = history.length > 0 ? history[history.length-1] : {discVar:40,discFixed:2,tryVar:30,tryFixed:1,buyVar:77,buyFixed:2,useVar:31,useFixed:2,renewVar:15,renewFixed:0};

    const getPhasePct = (key) => {
        const tot = Object.values(alloc).reduce((a,b)=>a+Number(b||0),0);
        const val = Number(alloc[`${key}Var`]||0) + Number(alloc[`${key}Fixed`]||0);
        return tot > 0 ? Math.round(val/tot*100) : 0;
    };

    const getPrevPhaseVal = (key, type) => {
        const k = `${key}${type === 'var' ? 'Var' : 'Fixed'}`;
        return prevAlloc[k] || 0;
    };

    const handleCommit = async () => {
        if (totalSpend !== targetBudget || loading) return;
        setLoading(true);
        const newHistory = [...history, alloc];
        try {
            const res = await fetch('/api/simulate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ allocations: newHistory })
            });
            const data = await res.json();
            setHistory(newHistory);
            const mapped = data.results.map(r => ({
                ...r,
                netNewArr: r.arr ?? r.netNewArr,
                // Keep ROI as a number for formatting — don't stringify here
                roi: r.roi !== undefined ? parseFloat(r.roi) : null,
            }));
            setResults(mapped);
            setActivePhase(0);
            setHypothesis('');
            // If this was the last quarter, show the results first before final screen
            if (newHistory.length === 8) {
                setShowFinalScreen(false);
            }
        } catch(e) {
            alert('API Error: Could not connect. Is the server running?');
        }
        setLoading(false);
    };

    const reset = () => { setResults([]); setHistory([]); setAlloc(DEFAULTS_2021); setActivePhase(0); setHypothesis(''); setShowFinalScreen(false); };

    // Game Over (after Q4 2021 midpoint check)
    if (results.length === 4 && results[3].netNewArr < 500) {
        return (
            <div className="overlay">
                <div className="overlay-card">
                    <h2 style={{color:'#c0392b'}}>❌ Project Defunded</h2>
                    <p>You achieved only <strong style={{color:'#c0392b'}}>${results[3].netNewArr}M</strong> Net ARR by Q4 2021.<br/>The Board requires a minimum of <strong>$500M</strong> to authorize the 2022 budget increase.</p>
                    <button className="btn-commit" onClick={reset}>Try Again</button>
                </div>
            </div>
        );
    }

    // Win Screen — only shown AFTER user clicks "View Final Results"
    // This ensures Q4 2022 chart and results table are visible first
    if (results.length === 8 && showFinalScreen) {
        const finalArr = results[7].netNewArr;
        const won = finalArr >= 625;
        return (
            <div className="overlay">
                <div className="overlay-card">
                    <h2 style={{color: won ? '#2a7a3b' : '#c0392b'}}>{won ? '🏆 Simulation Complete!' : '📉 Simulation Complete'}</h2>
                    <p>{won ? 'Congratulations! You exceeded the $625M target.' : 'You did not reach the $625M target in Q4 2022.'}</p>
                    <div className="big-num" style={{color: won ? '#2a7a3b' : '#c0392b'}}>${finalArr}M</div>
                    <p style={{fontSize:'0.85rem'}}>Final Q4 2022 Net New ARR</p>
                    <button className="btn-commit" style={{marginTop:20}} onClick={reset}>Restart</button>
                </div>
            </div>
        );
    }

    // ── SIMULATION COMPLETE: show results summary, not the input form ──
    if (results.length === 8 && activeReportTab === 'input') {
        setActiveReportTab('consolidated');
    }

    const expectedLabels = ["Q1-2021", "Q2-2021", "Q3-2021", "Q4-2021", "Q1-2022", "Q2-2022", "Q3-2022", "Q4-2022"];

        { id: 'intro', label: 'Intro', disabled: false },

    if (results.length === 8 && activeReportTab !== 'input') {

        return (

                                    <div>
                                        <div style={{fontSize:'1.1rem', fontWeight:700, color: won?'#2a7a3b':'#c0392b', marginBottom:4}}>

                                                {won ? '(Target: $625M ✓)' : '(Target: $625M ✗)'}
                                            </span>
                                        </div>
                                    </div>
                                    <div style={{display:'flex', gap:12}}>
                                        {showFinalScreen && (
                                            <div style={{
                                                background: won?'#2a7a3b':'#c0392b',
                                                color:'#fff', borderRadius:8,
                                                padding:'12px 24px', textAlign:'center',
                                                fontSize:'0.95rem', fontWeight:600
                                            }}>
                                                {won ? '🏆 You Won!' : '📉 Better luck next time'}
                                            </div>
                                        )}
                                        {!showFinalScreen && (
                                            <button className="btn-commit"
                                                style={{background: won?'#2a7a3b':'#c0392b', border:'none', padding:'12px 28px', fontSize:'1rem'}}
                                                onClick={() => setShowFinalScreen(true)}>
                                                🏁 View Final Score
                                            </button>
                                        )}
                                        <button className="btn-commit" style={{background:'#555', border:'none', padding:'12px 28px', fontSize:'1rem'}}
                                            onClick={reset}>
                                            🔄 Restart
                                        </button>
                                    </div>
                                </div>

                                {/* TWO COLUMN: CHART + KPI */}
                                <div className="two-col">
                                    <div className="col-left">
                                        <BudgetChart history={history} />
                                    </div>
                                    <div className="col-right">
                                        <KpiPanel results={results} />
                                    </div>
                                </div>

                                {/* ARR + ROI RESULTS CHART */}
                                <div className="two-col" style={{borderBottom:'1px solid #ddd'}}>
                                    <div style={{gridColumn:'1 / -1', background:'#fff', padding:'20px 24px'}}>
                                        <ResultsChart results={results} />
                                        <ConsolidatedReport results={results} />
                                    </div>
                                </div>

                                {/* FULL EXECUTION LOG */}
                                <div className="results-area">
                                    <div style={{fontSize:'0.9rem', fontWeight:600, color:'#333', marginBottom:14}}>
                                        Full Execution Log — All 8 Quarters
                                    </div>
                                    <table className="results-table">
                                        <thead>
                                            <tr>
                                                <th>Quarter</th>
                                                <th>Visitors (M)</th>
                                                <th>Trials (M)</th>
                                                <th>Orders (M)</th>
                                                <th>Gross ARR ($M)</th>
                                                <th>Cancel ARR ($M)</th>
                                                <th>Net New ARR ($M)</th>
                                                <th>Retention</th>
                                                <th>ROI</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {results.map((r,i) => (
                                                <tr key={i} style={{background: i===7 ? (won?'#eafaf1':'#fdf2f2') : undefined}}>
                                                    <td style={{fontWeight: i===7 ? 800 : 600, color: i===7 ? (won?'#2a7a3b':'#c0392b') : undefined}}>{r.quarter}</td>
                                                    <td>{r.visitors}</td>
                                                    <td>{r.trials}</td>
                                                    <td>{r.orders}</td>
                                                    <td style={{color:'#2a7a3b',fontWeight:500}}>${r.grossArr}M</td>
                                                    <td style={{color:'#c0392b'}}>${r.cancelArr}M</td>
                                                    <td style={{fontWeight:700, fontSize: i===7?'1.1rem':'1rem', color: i===7?(won?'#2a7a3b':'#c0392b'):undefined}}>${r.netNewArr}M</td>
                                                    <td>{r.retention}%</td>
                                                    <td>{r.roi !== null && r.roi !== undefined ? `$${parseFloat(r.roi).toFixed(2)} per $1` : 'N/A'}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {activeReportTab.startsWith('q-') && (() => {
                            const idx = parseInt(activeReportTab.split('-')[1]);
                            const qResult = results[idx];
                            return (
                                <div style={{padding: '40px', background:'#fff', flex: 1}}>
                                    <h2 style={{color: '#333', fontSize: '1.4rem', marginBottom: '20px', borderBottom: '2px solid #ddd', paddingBottom: '10px'}}>
                                        {qResult.quarter} - Performance Report
                                    </h2>
                                    <div style={{display:'flex', gap:'20px', alignItems:'flex-start'}}>
                                        <div style={{flex: 1, padding: '20px', border: '1px solid #eee', borderRadius: '8px', background: '#fafafa'}}>
                                            <KpiPanel results={results.slice(0, idx + 1)} />
                                        </div>

                        })()}

                        {activeReportTab === 'intro' && (
                            <div style={{padding: '40px', background:'#fff', flex: 1}}>

                                <p style={{marginTop: 20, color:'#555', lineHeight: '1.6'}}>
                                    Welcome to the DDOM Simulation Dashboard.<br/><br/>
                                    You have completed the marketing simulation over 8 quarters.<br/>
                                    Use the left sidebar navigation to review your performance quarter by quarter, or view the <strong>Consolidated Report</strong> to see an aggregate of all 8 quarters alongside your final KPI trends.
                                </p>
                            </div>
                        )}
                    </div>
                </div>
            </div>
        );
    }

    const phase = PHASES[activePhase];

                    <div style={{fontSize:'0.9rem', color:'#555', fontWeight:500}}>| DDOM Simulation</div>
                </div>
                <div className="quarter-badge">Quarter {qInYear}, {year}</div>

                            onClick={() => {

                                </div>

                                    Input your budget for Quarter {qInYear}, {year}
                                </div>
                                <div className="phase-tabs-row" style={{margin:'0 -0px'}}>

                                        <div key={p.key} className={`phase-tab ${activePhase===i?'active':''}`} onClick={() => setActivePhase(i)}>

                    onChange={e => setHypothesis(e.target.value)}
                />
                <div className="char-count">{maxHyp - hypothesis.length} characters remaining</div>
            </div>

            {/* COMMIT BUTTON */}
            <div className="commit-row">
                <button
                    className="btn-commit"
                    disabled={totalSpend !== targetBudget || loading}
                    onClick={handleCommit}
                >
                    {loading ? 'Simulating...' : `Commit Q${qInYear} Strategy →`}
                </button>
            </div>

            {/* RESULTS TABLE */}
            {results.length > 0 && (
                <div className="results-area">
                    {/* ARR + ROI Chart */}
                    <div style={{marginBottom:20}}>
                        <ResultsChart results={results} />
                    </div>
                    <div style={{fontSize:'0.9rem', fontWeight:600, color:'#333', marginBottom:14}}>Execution Log</div>
                    <table className="results-table">
                        <thead>
                            <tr>
                                <th>Quarter</th>
                                <th>Visitors (M)</th>
                                <th>Trials (M)</th>
                                <th>Orders (M)</th>
                                <th>Gross ARR ($M)</th>
                                <th>Cancel ARR ($M)</th>
                                <th>Net New ARR ($M)</th>
                                <th>Retention</th>
                                <th>ROI</th>
                            </tr>
                        </thead>
                        <tbody>
                            {results.map((r,i) => (
                                <tr key={i}>
                                    <td style={{fontWeight:600}}>{r.quarter}</td>
                                    <td>{r.visitors}</td>
                                    <td>{r.trials}</td>
                                    <td>{r.orders}</td>
                                    <td style={{color:'#2a7a3b',fontWeight:500}}>${r.grossArr}M</td>
                                    <td style={{color:'#c0392b'}}>${r.cancelArr}M</td>
                                    <td style={{fontWeight:700, fontSize:'1rem'}}>${r.netNewArr}M</td>
                                    <td>{r.retention}%</td>
                                    <td>{r.roi !== null && r.roi !== undefined ? `$${parseFloat(r.roi).toFixed(2)} per $1` : 'N/A'}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            )}
            </>
            ) : null}

            {activeReportTab.startsWith('q-') && (() => {
                const idx = parseInt(activeReportTab.split('-')[1]);
                const qResult = results[idx];
                if (!qResult) return null;
                return (
                    <div style={{padding: '40px', background:'#fff', flex: 1}}>
                        <h2 style={{color: '#333', fontSize: '1.4rem', marginBottom: '20px', borderBottom: '2px solid #ddd', paddingBottom: '10px'}}>
                            {qResult.quarter} - Performance Report
                        </h2>
                        <div style={{display:'flex', gap:'20px', alignItems:'flex-start'}}>
                            <div style={{flex: 1, padding: '20px', border: '1px solid #eee', borderRadius: '8px', background: '#fafafa'}}>
                                <KpiPanel results={results.slice(0, idx + 1)} />
                            </div>
                        </div>
                    </div>
                )
            })()}

            {activeReportTab === 'intro' && (
                <div style={{padding: '50px', background:'#fff', flex: 1, overflowY: 'auto'}}>
                    <h2 style={{color: '#2c3e50', marginTop: 0, fontSize: '1.8rem', borderBottom: '2px solid #eee', paddingBottom: '15px', marginBottom: '30px'}}>Welcome to the Simulation</h2>
                    
                    <h3 style={{color: '#2c3e50', marginTop: 0, fontSize: '1.3rem', borderBottom: '1px solid #eee', paddingBottom: '8px'}}>The Challenge</h3>
                    <p style={{color: '#555', lineHeight: 1.6, fontSize: '1.05rem'}}>
                        You are stepping into the role of a Marketing Executive. Over the next <strong>8 quarters</strong> (2021 & 2022), you must allocate a constrained marketing budget across the customer lifecycle to hit aggressive Net-New ARR targets.
                    </p>
                    <ul style={{color: '#555', lineHeight: 1.6, fontSize: '1.05rem', background: '#fafafa', padding: '15px 35px', borderRadius: '8px', border: '1px solid #eaeaea'}}>
                        <li style={{marginBottom: '10px'}}><strong>2021:</strong> $250M budget/qtr → Target: <strong style={{color:'#1a5276'}}>$500M</strong> Net-New ARR per quarter</li>
                        <li><strong>2022:</strong> $300M budget/qtr → Target: <strong style={{color:'#1a5276'}}>$625M</strong> Net-New ARR per quarter</li>
                    </ul>

                    <h3 style={{color: '#2c3e50', marginTop: '35px', fontSize: '1.3rem', borderBottom: '1px solid #eee', paddingBottom: '8px'}}>The 5 Phases (DDOM Framework)</h3>
                    <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '15px', marginTop: '15px'}}>
                        <div style={{background:'#f9fcfb', padding:'15px', borderRadius:'8px', borderLeft:'4px solid #1abc9c', fontSize:'0.95rem', color:'#444'}}>
                            <strong>1. Discover:</strong> Drive traffic (Awareness ads, SEO).
                        </div>
                        <div style={{background:'#fefaf2', padding:'15px', borderRadius:'8px', borderLeft:'4px solid #f1c40f', fontSize:'0.95rem', color:'#444'}}>
                            <strong>2. Try:</strong> Convert visitors to Free Trials.
                        </div>
                        <div style={{background:'#fbf5f5', padding:'15px', borderRadius:'8px', borderLeft:'4px solid #e74c3c', fontSize:'0.95rem', color:'#444'}}>
                            <strong>3. Buy:</strong> Convert trials to paying customers.
                        </div>
                        <div style={{background:'#f6f8fb', padding:'15px', borderRadius:'8px', borderLeft:'4px solid #3498db', fontSize:'0.95rem', color:'#444'}}>
                            <strong>4. Use:</strong> Keep customers engaged and active.
                        </div>
                        <div style={{background:'#faf6fd', padding:'15px', borderRadius:'8px', borderLeft:'4px solid #9b59b6', fontSize:'0.95rem', color:'#444', gridColumn: '1 / -1', textAlign: 'center'}}>
                            <strong>5. Renew:</strong> Save offers to prevent churn.
                        </div>
                    </div>

                    <h3 style={{color: '#2c3e50', marginTop: '35px', fontSize: '1.3rem', borderBottom: '1px solid #eee', paddingBottom: '8px'}}>Budget Strategy</h3>
                    <div style={{display: 'flex', gap: '20px', marginTop: '15px'}}>
                        <div style={{flex: 1, background:'#fefce8', padding:'20px', borderRadius:'8px', border:'1px solid #f2e291'}}>
                            <h4 style={{margin:'0 0 10px 0', fontSize:'1.05rem', color:'#b7950b'}}>💨 Variable Spend</h4>
                            <p style={{margin:0, fontSize:'0.95rem', color:'#666', lineHeight: 1.5}}>Drives short-term results <strong>this quarter</strong>. Like buying ads to get immediate traffic.</p>
                        </div>
                        <div style={{flex: 1, background:'#ebf5fb', padding:'20px', borderRadius:'8px', border:'1px solid #aed6f1'}}>
                            <h4 style={{margin:'0 0 10px 0', fontSize:'1.05rem', color:'#2874a6'}}>🌱 Fixed Spend</h4>
                            <p style={{margin:0, fontSize:'0.95rem', color:'#666', lineHeight: 1.5}}>Builds long-term efficiency for <strong>next quarter and beyond</strong>. Like optimizing your engine.</p>
                        </div>
                    </div>


                </div>
            )}
            </div>
        </div>
        </div>
    );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
